<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Throttle vs Debounce Demo</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #output { margin-top: 20px; }
    .log { margin: 5px 0; }
  </style>
</head>
<body>
  <h1>Throttle vs Debounce Demo</h1>

  <input id="searchBox" placeholder="Type here..." />
  <div id="output"></div>

  <script>
    // Debounce implementation
    function debounce(fn, delay) {
      let timer;
      return function(...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
      };
    }

    // Throttle implementation
    function throttle(fn, delay) {
      let lastTime = 0;
      return function(...args) {
        const now = Date.now();
        if (now - lastTime >= delay) {
          lastTime = now;
          fn.apply(this, args);
        }
      };
    }

    const output = document.getElementById("output");

    // Debounced handler
    const debouncedSearch = debounce((query) => {
      const div = document.createElement("div");
      div.className = "log";
      div.textContent = "Debounced: " + query + " at " + Date.now();
      output.appendChild(div);
    }, 2000);

    // Throttled handler
    const throttledSearch = throttle((query) => {
      const div = document.createElement("div");
      div.className = "log";
      div.textContent = "Throttled: " + query + " at " + Date.now();
      output.appendChild(div);
    }, 2000);

    // Attach both to input
    document.getElementById("searchBox").addEventListener("input", function(e) {
      debouncedSearch(e.target.value);
      throttledSearch(e.target.value);
    });
  </script>
</body>
</html>
